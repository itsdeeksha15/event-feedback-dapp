<!DOCTYPE html>
<html>
<head>
    <title>Event Feedback DApp</title>

    <!-- Web3 -->
    <script src="https://cdn.jsdelivr.net/npm/web3@1.8.2/dist/web3.min.js"></script>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            height: 100vh;
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .card {
            background: white;
            padding: 30px;
            width: 350px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        h2 {
            margin-bottom: 10px;
        }

        p {
            color: #555;
            font-size: 14px;
        }

        button {
            margin: 10px;
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            cursor: pointer;
            transition: 0.3s;
        }

        .connect {
            background: #667eea;
            color: white;
        }

        .good {
            background: #4CAF50;
            color: white;
        }

        .average {
            background: #FFC107;
            color: black;
        }

        button:hover {
            transform: scale(1.05);
            opacity: 0.9;
        }

        /* Popup */
        .popup {
            position: fixed;
            top: 20px;
            right: 20px;
            background: #333;
            color: white;
            padding: 12px 20px;
            border-radius: 8px;
            display: none;
        }
    </style>
</head>

<body>

<div class="card">
    <h2>Event Feedback</h2>
    <p>Submit your feedback securely using blockchain</p>

    <button class="connect" onclick="connectWallet()">Connect MetaMask</button>

    <div style="margin-top:20px;">
        <button class="good" onclick="goodFeedback()">👍 Good</button>
        <button class="average" onclick="averageFeedback()">😐 Average</button>
    </div>
</div>

<div class="popup" id="popup"></div>

<script src="script.js"></script>

</body>
</html>
