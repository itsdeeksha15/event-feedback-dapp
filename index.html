<!DOCTYPE html>
<html>
<head>
    <title>Event Feedback DApp</title>

    <script src="https://cdn.jsdelivr.net/npm/web3@1.8.2/dist/web3.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            height: 100vh;
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            justify-content: center;
            align-items: center;
            transition: 0.3s;
        }

        body.dark {
            background: #121212;
        }

        .card {
            background: white;
            padding: 30px;
            width: 360px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            transition: 0.3s;
        }

        body.dark .card {
            background: #1e1e1e;
            color: white;
        }

        button {
            margin: 8px;
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
        }

        .connect { background: #667eea; color: white; }
        .good { background: #4CAF50; color: white; }
        .average { background: #FFC107; }
        .toggle { background: #333; color: white; }

        .counter {
            margin-top: 10px;
            font-size: 14px;
        }

        .popup {
            position: fixed;
            top: 20px;
            right: 20px;
            background: #333;
            color: white;
            padding: 12px 20px;
            border-radius: 8px;
            display: none;
        }

        .spinner {
            display: none;
            margin: 15px auto;
            width: 40px;
            height: 40px;
            border: 4px solid #ccc;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            100% { transform: rotate(360deg); }
        }
    </style>
</head>

<body>

<div class="card">
    <h2>Event Feedback</h2>
    <p id="wallet">Wallet: Not connected</p>

    <button class="connect" onclick="connectWallet()">Connect MetaMask</button>
    <button class="toggle" onclick="toggleTheme()">Dark / Light</button>

    <div style="margin-top:15px;">
        <button class="good" onclick="goodFeedback()">👍 Good</button>
        <button class="average" onclick="averageFeedback()">😐 Average</button>
    </div>

    <div class="spinner" id="spinner"></div>

    <div class="counter">
        👍 Good: <span id="goodCount">0</span> |
        😐 Average: <span id="avgCount">0</span>
    </div>
</div>

<div class="popup" id="popup"></div>

<script src="script.js"></script>
</body>
</html>
